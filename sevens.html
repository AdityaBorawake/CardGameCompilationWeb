<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Sevens — Card Game Compilation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css"/>
  <style>
    /* ── Skip button ── */
    #skip-btn {
      padding:9px 18px;border-radius:11px;
      border:1.5px solid rgba(255,255,255,0.12);
      background:rgba(255,255,255,0.06);
      color:rgba(255,232,190,0.45);
      font-size:0.82rem;font-weight:700;cursor:default;
      letter-spacing:0.03em;transition:all 200ms ease;flex-shrink:0;
    }
    #skip-btn:disabled{opacity:.35;}
    #skip-btn.skip-ready{cursor:pointer;color:#fff8e8;background:rgba(255,200,60,.12);border-color:rgba(255,200,60,.35);}
    #skip-btn.skip-glow{
      box-shadow:0 0 0 2px rgba(255,200,60,.25),0 0 16px rgba(255,200,60,.35),0 0 32px rgba(255,200,60,.15);
      animation:skipPulse 1.6s ease-in-out infinite;
    }
    @keyframes skipPulse{
      0%,100%{box-shadow:0 0 0 2px rgba(255,200,60,.25),0 0 16px rgba(255,200,60,.35),0 0 32px rgba(255,200,60,.15);}
      50%{box-shadow:0 0 0 3px rgba(255,200,60,.4),0 0 24px rgba(255,200,60,.55),0 0 48px rgba(255,200,60,.25);}
    }
    #skip-btn.skip-ready:hover{transform:translateY(-2px);background:rgba(255,200,60,.18);border-color:rgba(255,200,60,.55);}

    /* ── Deal button ── */
    #deal-btn {
      padding:11px 26px;border-radius:13px;border:0;
      background:linear-gradient(135deg,#2a8c5a,#1a6040);
      color:#fff;font-size:0.9rem;font-weight:700;cursor:pointer;flex-shrink:0;
      box-shadow:0 8px 22px rgba(20,80,40,.4);transition:all 160ms ease;
    }
    #deal-btn:hover{transform:translateY(-2px);box-shadow:0 12px 28px rgba(20,80,40,.5);}
    #deal-btn:active{transform:translateY(0);}
    #deal-banner {
      text-align:center;font-size:0.78rem;color:rgba(160,240,180,.75);margin-bottom:2px;
    }

    /* ── Fill bots (in-game) ── */
    #fill-bots-ingame {
      padding:8px 16px;border-radius:10px;flex-shrink:0;
      border:1.5px dashed rgba(100,180,255,.3);
      background:rgba(100,180,255,.06);
      color:rgba(160,210,255,.85);font-size:0.78rem;font-weight:600;cursor:pointer;
      transition:all 150ms;
    }
    #fill-bots-ingame:hover{background:rgba(100,180,255,.12);border-color:rgba(100,180,255,.5);}
    #fill-bots-ingame.hidden{display:none!important;}

    /* ── Hotseat guard ── */
    .turn-guard {
      display:flex;flex-direction:column;align-items:center;gap:10px;
      padding:16px;border-radius:14px;
      background:rgba(10,12,30,.7);border:1px solid rgba(255,255,255,.08);
      margin-top:8px;
    }
    .turn-guard-title{font-family:'DM Serif Display',serif;font-size:1.15rem;color:#f8e6be;}
    .turn-guard-copy {font-size:0.8rem;color:rgba(255,232,190,.55);text-align:center;}
    .turn-guard-btn{
      padding:9px 22px;border-radius:11px;border:0;
      background:linear-gradient(135deg,#c04b30,#8c3020);
      color:#fff;font-size:0.86rem;font-weight:700;cursor:pointer;
      box-shadow:0 6px 16px rgba(140,48,32,.3);transition:all 140ms;
    }
    .turn-guard-btn:hover{transform:translateY(-1px);}

    /* ── Guard card placeholders ── */
    .guard-card{
      width:var(--cw);height:var(--ch);border-radius:var(--cr);
      background:linear-gradient(160deg,#96e0f0,#54b0e6);
      border:1.5px solid rgba(255,255,255,.28);
      box-shadow:0 6px 14px rgba(0,0,0,.2);
      margin-left:calc(var(--cw)*-.28);
    }
    .guard-card:first-child{margin-left:0;}

    /* Extra opponent seats for 4-5 player games */
    .opp-extra{grid-area:unset;display:flex;justify-content:center;align-items:center;gap:10px;flex-wrap:wrap;}
  </style>
</head>
<body>
<div class="game-page" id="app">

  <header class="game-topbar">
    <a class="brand-block" href="./index.html">
      <span class="brand-icon-stack" aria-hidden="true">
        <span class="mini-card mini-card-red"></span>
        <span class="mini-card mini-card-gold"></span>
        <span class="mini-card mini-card-blue"></span>
      </span>
      <span class="brand-copy"><span>Card Game</span><span>Compilation</span></span>
    </a>
    <div class="topbar-center">
      <span class="turn-chip" id="turn-chip">Loading…</span>
    </div>
    <div class="topbar-actions">
      <button class="icon-btn" id="toggle-setup" type="button" aria-expanded="false">Setup</button>
      <a class="icon-btn" href="./lobby.html?game=sevens">&#8592; Lobby</a>
    </div>
  </header>

  <div class="status-bar" id="status" role="status" aria-live="polite">
    Build the board from the sevens outward.
  </div>

  <!-- Setup drawer -->
  <section class="setup-drawer" id="setup-drawer" aria-hidden="true">
    <div class="setup-row">
      <div class="setup-group">
        <label class="setup-label" for="mode">Mode</label>
        <select class="setup-select" id="mode">
          <option value="solo">Solo vs CPU</option>
          <option value="semi">2P vs CPU</option>
          <option value="hotseat">Hotseat</option>
          <option value="room-host">Host Room</option>
          <option value="room-join">Join Room</option>
        </select>
      </div>
      <div class="setup-group">
        <label class="setup-label" for="room-code">Room Code</label>
        <input class="setup-input" id="room-code" value="SEVENS-1" autocomplete="off" spellcheck="false"/>
      </div>
      <div class="setup-group" style="flex:none">
        <label class="setup-label">&nbsp;</label>
        <button class="setup-btn primary" id="start-btn">Restart</button>
      </div>
    </div>
    <div class="setup-status" id="setup-status">
      Room mode uses Socket.IO when server is running, otherwise same-browser tabs (BroadcastChannel).
    </div>
  </section>

  <!-- Play area -->
  <main class="table-arena arena-3p">
    <!-- Standard 3-player seats -->
    <div class="opp-top"   id="seat-top"></div>
    <div class="opp-left"  id="seat-left"></div>
    <div class="opp-right" id="seat-right"></div>

    <!-- Extra seats for 4th and 5th player (hidden unless used) -->
    <div class="opp-extra" id="seat-extra1" style="display:none"></div>
    <div class="opp-extra" id="seat-extra2" style="display:none"></div>

    <div class="board-area">
      <div class="play-announce fade" id="announce" aria-live="polite"></div>
      <div class="board-inner">
        <div class="sevens-lanes" id="board"></div>
      </div>
    </div>

    <section class="player-tray">
      <!-- Deal + fill-bots controls (host only, before deal) -->
      <div id="deal-banner" class="hidden" style="display:flex;flex-direction:column;align-items:center;gap:5px;flex-shrink:0">
        <div style="font-size:0.72rem;color:rgba(160,240,180,.7);text-align:center">Ready? Press Deal to distribute cards.</div>
        <div style="display:flex;gap:8px;align-items:center">
          <button id="deal-btn" type="button">&#127183; Deal cards</button>
          <button id="fill-bots-ingame" type="button" class="hidden">&#129302; Fill bots</button>
        </div>
      </div>

      <div class="player-identity" id="player-profile"></div>

      <div class="hand-wrap">
        <div class="hand-label" id="hand-title">Your Hand</div>
        <div class="hand-fan" id="hand" role="group" aria-label="Your cards"></div>
        <!-- Hotseat guard -->
        <div class="turn-guard hidden" id="turn-guard">
          <div class="turn-guard-title" id="turn-guard-title">Pass the device</div>
          <div class="turn-guard-copy"  id="turn-guard-copy"></div>
          <button class="turn-guard-btn" id="turn-guard-btn" type="button">Reveal cards</button>
        </div>
      </div>

      <!-- Skip button -->
      <button id="skip-btn" type="button" disabled
              aria-label="Skip turn — only when you have no legal moves"
              title="Skip is only available when you have no legal moves">
        Skip
      </button>
    </section>
  </main>

  <!-- Game over -->
  <div class="gameover-overlay hidden" id="gameover-overlay" role="dialog" aria-modal="true">
    <div class="gameover-card">
      <h3 id="go-title">Game Over</h3>
      <p  id="go-message"></p>
      <div class="gameover-actions">
        <button class="go-btn primary"  id="go-restart">Play Again</button>
        <a class="go-btn secondary" href="./lobby.html?game=sevens">Change Setup</a>
        <a class="go-btn secondary" href="./index.html">&#8592; Menu</a>
      </div>
    </div>
  </div>

</div>
<script src="/socket.io/socket.io.js"></script>
<script src="./game-engine.js"></script>
<script src="./lobby-config.js"></script>
<script src="./room-bridge.js"></script>
<script src="./sevens.js"></script>
</body>
</html>
